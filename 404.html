<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0e27;
      color: #e8f0ff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 217, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    .code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      background: linear-gradient(135deg, #00d9ff, #7c3aed, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    h2 {
      font-size: 1.5rem;
      margin: 20px 0 10px;
      color: #e8f0ff;
    }

    p {
      opacity: 0.6;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    a {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #00d9ff, #7c3aed);
      color: #fff;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
    }

    a:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 217, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h2>Page Not Found</h2>
  <p>Looks like this page doesn't exist.</p>
  <a href="/">← Back to Portfolio</a>
</body>
</html>
