<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | Navneet Mallick</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #070b1f;
      --card-bg: rgba(20, 27, 58, 0.7);
      --accent: #00e5ff;
      --secondary: #8b5cf6;
      --text: #eaf2ff;
      --text-dim: rgba(234, 242, 255, 0.6);
      --border: rgba(0, 229, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* --- Login --- */
    .login-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      margin-top: 10vh;
      animation: fadeIn 0.6s ease-out;
    }

    .login-container.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .login-title { font-size: 2rem; margin-bottom: 10px; color: var(--accent); text-align: center; font-weight: 700; letter-spacing: -0.5px; }
    .login-subtitle { font-size: 0.9rem; color: var(--text-dim); text-align: center; margin-bottom: 35px; }

    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input {
      width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 12px; color: #fff; font-size: 16px; transition: all 0.3s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,229,255,0.2); }

    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--secondary));
      border: none; border-radius: 12px; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,229,255,0.2);
    }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,229,255,0.4); }

    .error-message { color: #ff4444; font-size: 0.85rem; margin-top: 15px; text-align: center; display: none; }
    .error-message.show { display: block; }

    /* --- Dashboard --- */
    .dashboard-container { display: none; width: 100%; max-width: 1300px; animation: fadeIn 0.6s ease-out; }
    .dashboard-container.visible { display: block; }

    .dashboard-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
      padding-bottom: 25px; border-bottom: 1px solid var(--border);
    }
    .dashboard-title { font-size: 2rem; color: var(--accent); font-weight: 700; }
    .header-actions { display: flex; gap: 15px; }

    .btn {
      padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 0.9rem;
    }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: rgba(0,229,255,0.1); border-color: var(--accent); }
    .btn-danger { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff4444; }
    .btn-danger:hover { background: rgba(255,68,68,0.2); border-color: #ff4444; }

    /* Stats Grid */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px;
      backdrop-filter: blur(10px); display: flex; flex-direction: column;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
    .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); }

    /* Charts Row */
    .charts-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 40px; }
    .chart-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px;
      backdrop-filter: blur(10px); height: 400px;
    }
    .chart-title { font-size: 1rem; color: var(--accent); margin-bottom: 20px; font-weight: 600; }

    /* Tables */
    .content-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 40px; }
    .box-header { padding: 20px 25px; background: rgba(0,229,255,0.05); border-bottom: 1px solid var(--border); font-weight: 700; color: var(--accent); }
    
    table { width: 100%; border-collapse: collapse; }
    th { padding: 15px 25px; text-align: left; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    td { padding: 18px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(0,229,255,0.03); }

    .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: rgba(0,229,255,0.1); color: var(--accent); }
    .badge-purple { background: rgba(139, 92, 246, 0.1); color: #a78bfa; }

    .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }
    .empty-state i { font-size: 3rem; margin-bottom: 20px; opacity: 0.3; }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
      .chart-card { height: 320px; }
    }

    @media (max-width: 600px) {
      .dashboard-header { flex-direction: column; align-items: stretch; gap: 20px; }
      .header-actions { flex-wrap: wrap; }
      .stat-value { font-size: 1.8rem; }
      .dashboard-title { font-size: 1.5rem; }
      td, th { padding: 12px 15px; font-size: 0.8rem; }
      .badge-desktop { display: none; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-container" id="loginContainer">
    <h1 class="login-title">📊 Analytics</h1>
    <p class="login-subtitle">Secure Access to Portfolio Insights</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Security Key</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
      </div>
      <button type="submit" class="login-btn">Initialize Dashboard</button>
      <div class="error-message" id="errorMessage">Invalid Security Key</div>
    </form>
  </div>

  <!-- Dashboard -->
  <div class="dashboard-container" id="dashboardContainer">
    <div class="dashboard-header">
      <h1 class="dashboard-title">📈 Insights Dashboard</h1>
      <div class="header-actions">
        <a href="../index.html" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> View Site</a>
        <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync"></i> Refresh</button>
        <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-history"></i> Sessions Over Time</div>
        <canvas id="sessionsChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-map"></i> Sections Popularity</div>
        <canvas id="sectionsChart"></canvas>
      </div>
    </div>

    <!-- Tables -->
    <div class="content-box">
      <div class="box-header"><i class="fas fa-list"></i> Recent Visitor Sessions</div>
      <div id="sessionsContent"></div>
    </div>

    <div style="display:flex; justify-content: flex-end; gap: 15px;">
        <button class="btn btn-outline" id="exportBtn"><i class="fas fa-file-download"></i> Export JSON</button>
        <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash-alt"></i> Reset All Data</button>
    </div>
  </div>

  <script>
    const PASSWORD_HASH = 'f96afadd9e873579177e663960412deb9ecdfba489c8e8d20c2a6db947fb9de2'; // "curiousXZ"

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const loginContainer = document.getElementById('loginContainer');
    const dashboardContainer = document.getElementById('dashboardContainer');
    const loginForm = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('errorMessage');
    
    let sessionsChart = null;
    let sectionsChart = null;

    function checkAuth() {
      if (sessionStorage.getItem('analytics-auth') === 'authenticated') showDashboard();
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const hash = await sha256(passwordInput.value);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem('analytics-auth', 'authenticated');
        showDashboard();
      } else {
        errorMessage.classList.add('show');
        passwordInput.value = '';
      }
    });

    function showDashboard() {
      loginContainer.classList.add('hidden');
      dashboardContainer.classList.add('visible');
      loadDashboard();
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('analytics-auth');
      window.location.reload();
    });

    function loadDashboard() {
      const allSessions = JSON.parse(localStorage.getItem('analytics-sessions') || '[]');
      
      if (allSessions.length === 0) {
        document.getElementById('statsGrid').innerHTML = '<div class="empty-state"><i class="fas fa-chart-bar"></i><p>Waiting for visitors...</p></div>';
        return;
      }

      // Stats
      const total = allSessions.length;
      const totalDuration = allSessions.reduce((sum, s) => sum + s.duration, 0);
      const totalViews = allSessions.reduce((sum, s) => sum + s.pageViews, 0);
      const totalInteractions = allSessions.reduce((sum, s) => sum + s.interactions, 0);

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Visits</div><div class="stat-value">${total}</div></div>
        <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-value">${totalViews}</div></div>
        <div class="stat-card"><div class="stat-label">Avg Duration</div><div class="stat-value">${Math.round(totalDuration/total)}s</div></div>
        <div class="stat-card"><div class="stat-label">Interactions</div><div class="stat-value">${totalInteractions}</div></div>
      `;

      // Table
      const tableHTML = `
        <table>
          <thead><tr><th>ID</th><th>Platform</th><th>Duration</th><th>Views</th><th>Interactions</th><th>Time</th></tr></thead>
          <tbody>
            ${allSessions.slice(-10).reverse().map(s => `
              <tr>
                <td title="${s.sessionId}"><code style="color:var(--accent)">${s.sessionId.substring(0,8)}</code></td>
                <td class="badge-desktop">${s.deviceInfo.platform.split(' ')[0]}</td>
                <td><span class="badge">${s.duration}s</span></td>
                <td>${s.pageViews}</td>
                <td><span class="badge badge-purple">${s.interactions}</span></td>
                <td>${new Date(s.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('sessionsContent').innerHTML = tableHTML;

      renderCharts(allSessions);
    }

    function renderCharts(data) {
      const ctx1 = document.getElementById('sessionsChart').getContext('2d');
      const ctx2 = document.getElementById('sectionsChart').getContext('2d');

      if (sessionsChart) sessionsChart.destroy();
      if (sectionsChart) sectionsChart.destroy();

      // Chart 1: Daily Sessions
      const dailyData = {};
      data.forEach(s => {
        const d = new Date(s.startTime).toLocaleDateString();
        dailyData[d] = (dailyData[d] || 0) + 1;
      });

      sessionsChart = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: Object.keys(dailyData),
          datasets: [{
            label: 'Visits',
            data: Object.values(dailyData),
            borderColor: '#00e5ff',
            backgroundColor: 'rgba(0, 229, 255, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
            x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
          }
        }
      });

      // Chart 2: Section Popularity
      const sectionData = {};
      data.forEach(s => {
        (s.sectionsVisited || []).forEach(sec => {
          sectionData[sec] = (sectionData[sec] || 0) + 1;
        });
      });

      sectionsChart = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: Object.keys(sectionData),
          datasets: [{
            data: Object.values(sectionData),
            backgroundColor: ['#00e5ff', '#8b5cf6', '#f59e0b', '#22c55e', '#ff4444', '#ff00c1'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.7)', usePointStyle: true, padding: 15 } }
          }
        }
      });
    }

    document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
    document.getElementById('exportBtn').addEventListener('click', () => {
        const data = localStorage.getItem('analytics-sessions') || '[]';
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'analytics.json'; a.click();
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
        if(confirm('Delete all analytics data?')) { localStorage.removeItem('analytics-sessions'); loadDashboard(); }
    });

    checkAuth();
  </script>
</body>
</html>
