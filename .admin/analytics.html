<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard - Navneet Mallick</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #070b1f 0%, #0b1228 100%);
      color: #eaf2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: rgba(27, 35, 69, 0.8);
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .login-container.hidden {
      display: none;
    }

    .dashboard-container {
      display: none;
      width: 100%;
      max-width: 1200px;
    }

    .dashboard-container.visible {
      display: block;
    }

    .login-title {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #00e5ff;
      text-align: center;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: rgba(234, 242, 255, 0.6);
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #00e5ff;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-radius: 8px;
      color: #eaf2ff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00e5ff;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00e5ff 0%, #8b5cf6 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3);
    }

    .error-message {
      color: #ff4444;
      font-size: 0.9rem;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Dashboard Styles */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(0, 229, 255, 0.2);
    }

    .dashboard-title {
      font-size: 2rem;
      color: #00e5ff;
    }

    .logout-btn {
      padding: 10px 20px;
      background: rgba(255, 68, 68, 0.2);
      border: 2px solid #ff4444;
      border-radius: 8px;
      color: #ff4444;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 68, 68, 0.3);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(27, 35, 69, 0.8);
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 0.9rem;
      color: rgba(234, 242, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #00e5ff;
    }

    .sessions-table {
      background: rgba(27, 35, 69, 0.8);
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .table-header {
      padding: 20px;
      border-bottom: 2px solid rgba(0, 229, 255, 0.2);
      font-weight: 600;
      color: #00e5ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 16px 20px;
      text-align: left;
      background: rgba(0, 229, 255, 0.05);
      border-bottom: 1px solid rgba(0, 229, 255, 0.1);
      font-weight: 600;
      color: #00e5ff;
      font-size: 0.9rem;
    }

    td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(0, 229, 255, 0.1);
      font-size: 0.9rem;
    }

    tr:hover {
      background: rgba(0, 229, 255, 0.05);
    }

    .time-badge {
      display: inline-block;
      background: rgba(0, 229, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #00e5ff;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .action-btn {
      padding: 10px 16px;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 8px;
      color: #00e5ff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      background: rgba(0, 229, 255, 0.2);
    }

    .action-btn.danger {
      background: rgba(255, 68, 68, 0.1);
      border-color: rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }

    .action-btn.danger:hover {
      background: rgba(255, 68, 68, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: rgba(234, 242, 255, 0.6);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      .login-container {
        padding: 30px 20px;
      }

      .dashboard-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.85rem;
      }

      th, td {
        padding: 12px 10px;
      }
    }
  </style>
</head>
<body>
  <!-- Login Container -->
  <div class="login-container" id="loginContainer">
    <h1 class="login-title">📊 Analytics</h1>
    <p class="login-subtitle">Portfolio Analytics Dashboard</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Enter password" 
          required
          autocomplete="off"
        >
      </div>
      <button type="submit" class="login-btn">Access Dashboard</button>
      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <!-- Dashboard Container -->
  <div class="dashboard-container" id="dashboardContainer">
    <div class="dashboard-header">
      <h1 class="dashboard-title">📊 Analytics Dashboard</h1>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Sessions Table -->
    <div class="sessions-table">
      <div class="table-header">Recent Sessions</div>
      <div id="sessionsContent"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn" id="refreshBtn">
        <i class="fas fa-sync"></i> Refresh
      </button>
      <button class="action-btn" id="exportBtn">
        <i class="fas fa-download"></i> Export JSON
      </button>
      <button class="action-btn danger" id="clearBtn">
        <i class="fas fa-trash"></i> Clear Data
      </button>
    </div>
  </div>

  <script>
    // Password hash (SHA-256 of your password)
    const PASSWORD_HASH = 'f96afadd9e873579177e663960412deb9ecdfba489c8e8d20c2a6db947fb9de2'; // "curiousXZ"

    // Simple SHA-256 implementation (for browser)
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    const loginContainer = document.getElementById('loginContainer');
    const dashboardContainer = document.getElementById('dashboardContainer');
    const loginForm = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('errorMessage');
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');

    // Check if already logged in
    function checkAuth() {
      const token = sessionStorage.getItem('analytics-auth');
      if (token === 'authenticated') {
        showDashboard();
      }
    }

    // Login handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = passwordInput.value;
      const hash = await sha256(password);

      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem('analytics-auth', 'authenticated');
        errorMessage.classList.remove('show');
        showDashboard();
      } else {
        errorMessage.textContent = 'Invalid password';
        errorMessage.classList.add('show');
        passwordInput.value = '';
      }
    });

    // Show dashboard
    function showDashboard() {
      loginContainer.classList.add('hidden');
      dashboardContainer.classList.add('visible');
      loadDashboard();
    }

    // Logout handler
    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('analytics-auth');
      loginContainer.classList.remove('hidden');
      dashboardContainer.classList.remove('visible');
      passwordInput.value = '';
      errorMessage.classList.remove('show');
    });

    // Load dashboard data
    function loadDashboard() {
      const allSessions = JSON.parse(localStorage.getItem('analytics-sessions') || '[]');
      
      if (allSessions.length === 0) {
        document.getElementById('statsGrid').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-chart-line"></i>
            <p>No analytics data yet</p>
          </div>
        `;
        document.getElementById('sessionsContent').innerHTML = `
          <div class="empty-state">
            <p>Sessions will appear here as users visit your portfolio</p>
          </div>
        `;
        return;
      }

      // Calculate stats
      const totalSessions = allSessions.length;
      const totalDuration = allSessions.reduce((sum, s) => sum + s.duration, 0);
      const totalPageViews = allSessions.reduce((sum, s) => sum + s.pageViews, 0);
      const totalInteractions = allSessions.reduce((sum, s) => sum + s.interactions, 0);
      const avgSessionDuration = Math.round(totalDuration / totalSessions);
      const avgInteractions = Math.round(totalInteractions / totalSessions);

      // Render stats
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Sessions</div>
          <div class="stat-value">${totalSessions}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Duration</div>
          <div class="stat-value">${Math.round(totalDuration / 60)}m</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Session</div>
          <div class="stat-value">${avgSessionDuration}s</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Page Views</div>
          <div class="stat-value">${totalPageViews}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Interactions</div>
          <div class="stat-value">${totalInteractions}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Interactions</div>
          <div class="stat-value">${avgInteractions}</div>
        </div>
      `;

      // Render sessions table
      const tableHTML = `
        <table>
          <thead>
            <tr>
              <th>Session ID</th>
              <th>Duration</th>
              <th>Page Views</th>
              <th>Interactions</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${allSessions.reverse().map(session => `
              <tr>
                <td><code style="font-size: 0.8rem; color: #00e5ff;">${session.sessionId.substring(0, 20)}...</code></td>
                <td><span class="time-badge">${session.duration}s</span></td>
                <td>${session.pageViews}</td>
                <td>${session.interactions}</td>
                <td>${new Date(session.startTime).toLocaleString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('sessionsContent').innerHTML = tableHTML;
    }

    // Refresh button
    refreshBtn.addEventListener('click', loadDashboard);

    // Export button
    exportBtn.addEventListener('click', () => {
      const allSessions = JSON.parse(localStorage.getItem('analytics-sessions') || '[]');
      const dataStr = JSON.stringify(allSessions, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `analytics-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });

    // Clear button
    clearBtn.addEventListener('click', () => {
      if (confirm('Are you sure? This will delete all analytics data.')) {
        localStorage.removeItem('analytics-sessions');
        loadDashboard();
      }
    });

    // Initialize
    checkAuth();
  </script>
</body>
</html>
